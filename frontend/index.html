<!-- frontend/index.html -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Torres Barber Club - Home</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="mobile-wrapper">
    <header class="mobile-header">
      <div class="menu-icon" aria-label="Menu" role="button" tabindex="0">
        <span></span>
        <span></span>
        <span></span>
      </div>
      <div class="logo-mobile">
        <div class="logo-main">TORRES</div>
        <div class="logo-sub">BARBER CLUB</div>
      </div>
      <div class="avatar-mobile" aria-label="Avatar">A</div>
    </header>

    <main class="mobile-hero">
      <p class="hero-text">Seu estilo, nossa tradição</p>
      <button class="btn-schedule">AGENDAR HORÁRIO</button>
      <p class="hero-subtext">Agende em poucos cliques</p>
    </main>

    <section class="services-section">
      <h2 class="services-title">Nossos Serviços</h2>
      <div class="services-grid">
        <div class="service-card">
          <div class="service-icon">✂</div>
          <div class="service-name">Corte</div>
          <div class="service-price">R$ 35</div>
        </div>
        <div class="service-card">
          <div class="service-icon">~</div>
          <div class="service-name">Barba</div>
          <div class="service-price">R$ 25</div>
        </div>
        <div class="service-card">
          <div class="service-icon">˘</div>
          <div class="service-name">Sobrancelha</div>
          <div class="service-price">R$ 20</div>
        </div>
        <div class="service-card">
          <div class="service-icon">♛</div>
          <div class="service-name">Combo</div>
          <div class="service-price">R$ 50</div>
        </div>
      </div>
    </section>

    <footer class="mobile-footer">
      © 2026 Torres Barber Club | Todos os direitos reservados
    </footer>
  </div>
</body>
</html>
